services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-js", "-m", "8222", "-p", "4222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - nats-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats-cli:
    image: natsio/nats-box
    container_name: nats-cli
    environment:
      - NATS_URL=nats://nats:4222
    command: ["sleep", "infinity"]
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    volumes:
      - ../../app/internal/proto:/proto

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - nats-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  crypto-ingestion-binance:
    container_name: crypto-ingestion-binance
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: crypto-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    environment:
      INGESTION_PLATFORM: binance
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  crypto-ingestion-polymarket:
    container_name: crypto-ingestion-polymarket
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: crypto-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    environment:
      INGESTION_PLATFORM: polymarket
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  token-ingestion:
    container_name: token-ingestion
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: token-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  market-price-aggregator:
    container_name: market-price-aggregator
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: market-price-aggregator
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

networks:
  nats-net:
    driver: bridge
