services:
  nats:
    image: nats:2.10-alpine
    container_name: nats
    command: ["-js", "-m", "8222", "-p", "4222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    networks:
      - nats-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  crypto-ingestion-binance:
    container_name: crypto-ingestion-binance
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: crypto-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    environment:
      INGESTION_PLATFORM: binance
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  crypto-ingestion-polymarket:
    container_name: crypto-ingestion-polymarket
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: crypto-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    environment:
      INGESTION_PLATFORM: polymarket
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  token-ingestion:
    container_name: token-ingestion
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: token-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  market-ingestion:
    container_name: market-ingestion
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: market-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

  price-to-beat-ingestion:
    container_name: price-to-beat-ingestion
    build:
      context: ../../app
      dockerfile: Dockerfile
      args:
        SERVICE: price-to-beat-ingestion
        TARGETOS: ${TARGETOS:-linux}
        TARGETARCH: ${TARGETARCH:-}
    env_file:
      - ../../.env
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - nats-net
    restart: unless-stopped

networks:
  nats-net:
    driver: bridge
